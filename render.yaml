services:
  - type: web
    name: blink-backend
    runtime: docker
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: 80
      - key: DATABASE_URL
        fromDatabase:
          name: blink-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: "/app:/app/engine:/app/algos"
      # Exchange API Keys (Placeholders)
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: JUPITER_API_KEY
        sync: false

databases:
  - name: blink-db
    plan: free
    region: ohio
