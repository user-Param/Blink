events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # WebSocket handshake support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream executor {
        server localhost:9001;
    }

    upstream research {
        server localhost:5001;
    }

    server {
        listen 80;

        # WebSocket endpoint for Executor
        location /ws/executor {
            proxy_pass http://executor;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket specific timeouts
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # API endpoint for Research Executor
        location /api/research {
            rewrite ^/api/research/(.*) /$1 break;
            proxy_pass http://research;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Default fallback
        location / {
            return 404;
        }
    }
}
