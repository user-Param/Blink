events {
    worker_connections 1024;
}

http {
    # Helper map for WebSocket upgrades
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # WebSocket endpoint for Datafeed
        location /ws/datafeed {
            proxy_pass http://localhost:9000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket endpoint for Executor
        location /ws/executor {
            proxy_pass http://localhost:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API endpoint for Research Executor
        location /api/research {
            # Removed manual CORS headers to let Flask-CORS handle it (prevents double-header errors)
            rewrite ^/api/research/(.*) /$1 break;
            proxy_pass http://localhost:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            return 404;
        }
    }
}
AlgoInstance> algos_;
    std::shared_ptr<RiskManager> riskManager_;
    OrderCallback order_callback_;
    std::string strategy_path_ = "../algos";
    std::unique_ptr<pybind11::scoped_interpreter> python_guard_;
    mutable std::mutex mutex_;

    void loadPythonStrategy(const std::filesystem::path& file);
};

#endif
