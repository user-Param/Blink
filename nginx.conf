events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # WebSocket endpoint for Datafeed
        location /ws/datafeed {
            proxy_pass http://localhost:9000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # WebSocket endpoint for Executor
        location /ws/executor {
            proxy_pass http://localhost:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # API endpoint for Research Executor
        location /api/research {
            # CORS headers for Vercel Frontend
            add_header 'Access-Control-Allow-Origin' 'https://blink-ashen.vercel.app' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://blink-ashen.vercel.app' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            rewrite ^/api/research/(.*) /$1 break;
            proxy_pass http://localhost:5001;
            proxy_set_header Host $host;
        }

        location / {
            return 404;
        }
    }
}
